<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vegetable Detector</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: rgba(15, 23, 42, 0.82);
      --panel-border: rgba(148, 163, 184, 0.18);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #34d399;
      --accent-2: #60a5fa;
      --danger: #f87171;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(52, 211, 153, 0.18), transparent 30%),
        radial-gradient(circle at top right, rgba(96, 165, 250, 0.18), transparent 28%),
        linear-gradient(160deg, #020617 0%, #0f172a 45%, #111827 100%);
    }

    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    .hero { margin-bottom: 24px; }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 4vw, 3.5rem);
      letter-spacing: -0.04em;
    }
    p { color: var(--muted); line-height: 1.5; }

    .grid {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      gap: 20px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 20px;
      backdrop-filter: blur(18px);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.28);
    }

    .sidebar, .main { padding: 20px; }
    .section { margin-bottom: 18px; }
    .section h2 {
      margin: 0 0 12px;
      font-size: 1rem;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: #cbd5e1;
    }

    label {
      display: block;
      margin: 10px 0 6px;
      color: #cbd5e1;
      font-size: 0.92rem;
    }

    input[type="text"], input[type="file"] {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      background: rgba(15, 23, 42, 0.9);
      color: var(--text);
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 14px;
      font-weight: 700;
      cursor: pointer;
      color: #07111f;
      background: linear-gradient(135deg, var(--accent), #a7f3d0);
    }

    button.secondary {
      color: var(--text);
      background: linear-gradient(135deg, rgba(96, 165, 250, 0.25), rgba(96, 165, 250, 0.08));
      border: 1px solid rgba(96, 165, 250, 0.35);
    }

    .status {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(2, 6, 23, 0.5);
      border: 1px solid rgba(148, 163, 184, 0.16);
      color: #cbd5e1;
      min-height: 48px;
      white-space: pre-wrap;
    }

    .canvas-wrap {
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--panel-border);
      background: rgba(2, 6, 23, 0.42);
    }

    canvas {
      width: 100%;
      display: block;
      background: #050816;
    }

    .results {
      margin-top: 16px;
      display: grid;
      gap: 10px;
    }

    .result {
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(15, 23, 42, 0.72);
      border: 1px solid rgba(148, 163, 184, 0.16);
    }

    .pill {
      display: inline-block;
      margin-top: 8px;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 0.8rem;
      background: rgba(52, 211, 153, 0.16);
      color: #99f6e4;
    }

    .muted { color: var(--muted); }

    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>Vegetable Detector</h1>
      <p>Load a local <code>.pth</code> checkpoint, upload an image, and run object detection in your browser.</p>
    </div>

    <div class="grid">
      <div class="card sidebar">
        <div class="section">
          <h2>Model</h2>
          <label for="modelPath">Model path on server</label>
          <input id="modelPath" type="text" placeholder="/models/model.pth">
          <div class="row">
            <button id="loadPathBtn">Load path</button>
          </div>

          <label for="modelFile">Or upload a checkpoint</label>
          <input id="modelFile" type="file" accept=".pth,.pt">
          <div class="row">
            <button id="uploadModelBtn" class="secondary">Upload model</button>
          </div>
        </div>

        <div class="section">
          <h2>Image</h2>
          <label for="imageFile">Upload an image</label>
          <input id="imageFile" type="file" accept="image/*">
          <div class="row">
            <button id="predictBtn">Predict</button>
          </div>
        </div>

        <div id="status" class="status">No model loaded yet.</div>
      </div>

      <div class="card main">
        <div class="canvas-wrap">
          <canvas id="canvas"></canvas>
        </div>
        <div id="results" class="results"></div>
      </div>
    </div>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const resultsEl = document.getElementById('results');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const imgInput = document.getElementById('imageFile');
    const modelFileInput = document.getElementById('modelFile');
    const modelPathInput = document.getElementById('modelPath');

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.style.borderColor = isError ? 'rgba(248, 113, 113, 0.5)' : 'rgba(148, 163, 184, 0.16)';
      statusEl.style.color = isError ? '#fecaca' : '#cbd5e1';
    }

    function drawImageAndPredictions(image, predictions) {
      canvas.width = image.naturalWidth;
      canvas.height = image.naturalHeight;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(image, 0, 0);

      predictions.forEach((prediction) => {
        const [x1, y1, x2, y2] = prediction.box;
        const width = x2 - x1;
        const height = y2 - y1;

        ctx.strokeStyle = '#34d399';
        ctx.lineWidth = Math.max(2, canvas.width / 400);
        ctx.strokeRect(x1, y1, width, height);

        const label = `${prediction.label} ${(prediction.score * 100).toFixed(1)}%`;
        ctx.font = `${Math.max(14, canvas.width / 45)}px sans-serif`;
        const textWidth = ctx.measureText(label).width + 14;
        const textHeight = parseInt(ctx.font, 10) + 10;

        ctx.fillStyle = 'rgba(2, 6, 23, 0.85)';
        ctx.fillRect(x1, Math.max(0, y1 - textHeight), textWidth, textHeight);
        ctx.fillStyle = '#a7f3d0';
        ctx.fillText(label, x1 + 7, Math.max(14, y1 - 6));
      });
    }

    function renderResults(predictions) {
      resultsEl.innerHTML = '';
      if (!predictions.length) {
        resultsEl.innerHTML = '<div class="result muted">No detections above the score threshold.</div>';
        return;
      }

      predictions.forEach((prediction) => {
        const div = document.createElement('div');
        div.className = 'result';
        div.innerHTML = `
          <strong>${prediction.label}</strong>
          <span class="pill">${(prediction.score * 100).toFixed(1)}%</span>
          <div class="muted">box: [${prediction.box.map(v => v.toFixed(1)).join(', ')}]</div>
        `;
        resultsEl.appendChild(div);
      });
    }

    async function loadModelPath() {
      const modelPath = modelPathInput.value.trim();
      if (!modelPath) {
        setStatus('Enter a model path first.', true);
        return;
      }

      setStatus('Loading model...');
      const response = await fetch('/load-model', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({model_path: modelPath})
      });
      const data = await response.json();
      if (!response.ok) {
        setStatus(data.message || 'Failed to load model.', true);
        return;
      }

      setStatus(`Model loaded from ${data.source}`);
    }

    async function uploadModel() {
      if (!modelFileInput.files.length) {
        setStatus('Choose a .pth file first.', true);
        return;
      }

      setStatus('Uploading and loading model...');
      const form = new FormData();
      form.append('model', modelFileInput.files[0]);

      const response = await fetch('/load-model', { method: 'POST', body: form });
      const data = await response.json();
      if (!response.ok) {
        setStatus(data.message || 'Failed to load model.', true);
        return;
      }

      setStatus(`Model loaded from ${data.source}`);
    }

    async function predictImage() {
      if (!imgInput.files.length) {
        setStatus('Choose an image first.', true);
        return;
      }

      setStatus('Running prediction...');
      const form = new FormData();
      form.append('image', imgInput.files[0]);

      const response = await fetch('/predict', { method: 'POST', body: form });
      const data = await response.json();
      if (!response.ok) {
        setStatus(data.message || 'Prediction failed.', true);
        return;
      }

      const image = new Image();
      image.onload = () => drawImageAndPredictions(image, data.predictions);
      image.src = URL.createObjectURL(imgInput.files[0]);
      renderResults(data.predictions);
      setStatus(`Prediction complete. ${data.predictions.length} detection(s) found.`);
    }

    document.getElementById('loadPathBtn').addEventListener('click', loadModelPath);
    document.getElementById('uploadModelBtn').addEventListener('click', uploadModel);
    document.getElementById('predictBtn').addEventListener('click', predictImage);

    fetch('/health')
      .then((response) => response.json())
      .then((data) => {
        if (data.model_loaded) {
          setStatus(`Model loaded from ${data.model_source}`);
        }
      })
      .catch(() => {});
  </script>
</body>
</html>
